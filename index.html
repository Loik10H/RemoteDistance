<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Voice Assistant - Ultra Mobile</title>
    <style>
        :root {
            --bg: #05070a;
            --card: #11141d;
            --accent: #3b82f6;
            --glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --error: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; margin: 0; color: var(--accent); }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #444;
            margin-right: 8px;
        }
        .status-dot.active { background: var(--success); box-shadow: 0 0 10px var(--success); }

        #mainBtn {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-height: 250px;
            border-radius: 50%;
            border: none;
            background: var(--card);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 0 2px #222;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            position: relative;
        }

        #mainBtn.listening {
            box-shadow: 0 0 40px var(--glow), inset 0 0 0 3px var(--accent);
            animation: pulse 2s infinite;
        }

        #mainBtn.recording {
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.4), inset 0 0 0 3px var(--error);
            background: #1a0a0a;
        }

        #transcript-container {
            flex: 1;
            background: var(--card);
            border-radius: 20px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #222;
            font-size: 1rem;
            line-height: 1.5;
        }

        .log-box {
            height: 100px;
            background: #000;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            border-radius: 10px;
            overflow-y: auto;
            color: #888;
            border: 1px solid #222;
        }

        .user-text { color: var(--accent); margin-bottom: 10px; }
        .bot-text { color: var(--success); margin-bottom: 20px; font-weight: 500; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .wave {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            height: 30px;
            margin-top: 10px;
        }
        .bar {
            width: 4px;
            height: 10px;
            background: var(--accent);
            border-radius: 2px;
            transition: height 0.1s;
        }
        .recording .bar { background: var(--error); }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <h1>VOICE COMMAND</h1>
        <div style="margin-top: 5px; font-size: 0.8rem; opacity: 0.7;">
            <span id="dot" class="status-dot"></span> <span id="status-text">OFFLINE</span>
        </div>
    </div>

    <button id="mainBtn">
        <span id="btnText">TAP TO START</span>
        <div class="wave" id="wave">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </button>

    <div id="transcript-container">
        <div id="history"></div>
        <div id="current-speech" style="opacity: 0.6; font-style: italic;"></div>
    </div>

    <div class="log-box" id="debugLog">System Ready. Waiting for user interaction...</div>
</div>

<script>
/** 
 * CONFIGURATION 
 **/
const WEBHOOK = 'https://discord.com/api/webhooks/1491612529057726555/G18Pg3MfUmPOAaTwMldP04tUlCBXkcuVpJN5xwhZIQd0JxBzNXBeAGqhNVNzlI8p-xSd';
const CHANNEL_ID = '1491612406277869601';
const DISCORD_TOKEN = 'MTQ5MTYxNDk5MDQ1MTM0MzU0MA.GO5Rxr.Tm0qGeyxF5YecdfDc6IBONyRj3crTYsrzxy_T0';
const WAKE_WORDS = ['10 heure', '10heure', 'dix heures', 'dix heure'];
const STOP_WORDS = ['fini', 'terminé', 'stop', 'quitter', 'finish'];

/** 
 * GLOBALS 
 **/
let recognition;
let isStarted = false;
let isRecording = false;
let finalTranscript = '';

const mainBtn = document.getElementById('mainBtn');
const btnText = document.getElementById('btnText');
const statusText = document.getElementById('status-text');
const dot = document.getElementById('dot');
const historyEl = document.getElementById('history');
const currentSpeechEl = document.getElementById('current-speech');
const debugLog = document.getElementById('debugLog');

// Helper for mobile debugging
function log(msg) {
    const time = new Date().toLocaleTimeString().split(' ')[0];
    debugLog.innerHTML = `[${time}] ${msg}<br>` + debugLog.innerHTML;
    console.log(msg);
}

// Vibration patterns
const vibHaptic = () => navigator.vibrate?.(40);
const vibWakeWord = () => navigator.vibrate?.([100, 50, 100]);
const vibSuccess = () => navigator.vibrate?.(200);

/**
 * INITIALIZE MICROPHONE
 */
async function initMic() {
    log("Requesting mic access...");
    try {
        // This is the CRITICAL part for mobile Chrome:
        // We call getUserMedia before SpeechRecognition
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => track.stop()); // Close it immediately
        log("Permission GRANTED");
        return true;
    } catch (e) {
        log("Permission DENIED: " + e.message);
        alert("Permission Error: Please allow microphone in settings and ensure you are using HTTPS.");
        return false;
    }
}

function setupRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        log("Error: Browser doesn't support SpeechRecognition");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = () => {
        log("Engine: Listening...");
        statusText.textContent = "LISTENING FOR '10 HEURE'";
        dot.classList.add('active');
        mainBtn.className = 'listening';
        btnText.textContent = "I'M LISTENING";
    };

    recognition.onerror = (event) => {
        log("Recognition Error: " + event.error);
        if (event.error === 'not-allowed') {
            isStarted = false;
            btnText.textContent = "RE-ACTIVATE MIC";
        }
    };

    recognition.onend = () => {
        log("Engine: Disconnected");
        if (isStarted) {
            log("Attempting auto-restart...");
            try { recognition.start(); } catch(e) {}
        } else {
            statusText.textContent = "OFFLINE";
            dot.classList.remove('active');
            mainBtn.className = '';
        }
    };

    recognition.onresult = (event) => {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            const transcript = event.results[i][0].transcript.toLowerCase();
            if (event.results[i].isFinal) {
                handleText(transcript, true);
            } else {
                interimTranscript += transcript;
                handleText(interimTranscript, false);
            }
        }
    };
}

function handleText(text, isFinal) {
    if (!isRecording) {
        // Checking for Wake Word
        if (WAKE_WORDS.some(w => text.includes(w))) {
            isRecording = true;
            vibWakeWord();
            log("WAKE WORD DETECTED!");
            mainBtn.className = 'recording';
            btnText.textContent = "RECORDING...";
            finalTranscript = '';
            currentSpeechEl.textContent = "Go ahead, I'm listening...";
        }
    } else {
        // We are recording
        currentSpeechEl.textContent = text;
        
        if (isFinal) {
            finalTranscript += " " + text;
        }

        // Checking for Stop Word
        if (STOP_WORDS.some(w => text.includes(w))) {
            isRecording = false;
            vibSuccess();
            log("Stop word detected. Sending...");
            processCommand(finalTranscript);
            finalTranscript = '';
            currentSpeechEl.textContent = '';
            mainBtn.className = 'listening';
            btnText.textContent = "PROCESSING...";
        }
    }
}

async function processCommand(text) {
    if (!text.trim()) return;
    
    // Add to UI
    historyEl.innerHTML += `<div class="user-text"><b>You:</b> ${text}</div>`;
    
    // Get Location
    let loc = "unknown";
    try {
        const pos = await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, {timeout: 5000});
        });
        loc = `${pos.coords.latitude.toFixed(5)},${pos.coords.longitude.toFixed(5)}`;
    } catch (e) { log("Location error: " + e.message); }

    // Send to Discord
    try {
        await fetch(WEBHOOK, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ content: `[LOC:${loc}] ${text}` })
        });
        log("Sent to Discord");
        
        // Wait for Bot Response
        pollForResponse();
    } catch (e) {
        log("Fetch error: " + e.message);
    }
}

async function pollForResponse() {
    log("Polling for response...");
    let attempts = 0;
    const lastMsgId = null;

    const check = async () => {
        if (attempts > 10) {
            btnText.textContent = "I'M LISTENING";
            return;
        }
        
        try {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://discord.com/api/v10/channels/'+CHANNEL_ID+'/messages?limit=5')}`;
            const resp = await fetch(proxyUrl, {
                headers: { 'Authorization': 'Bot ' + DISCORD_TOKEN }
            });
            const data = await resp.json();
            const msgs = JSON.parse(data.contents);
            
            // Find first message not from a webhook
            const botMsg = msgs.find(m => !m.webhook_id);
            
            if (botMsg) {
                log("Response received!");
                historyEl.innerHTML += `<div class="bot-text"><b>AI:</b> ${botMsg.content}</div>`;
                speak(botMsg.content);
                btnText.textContent = "I'M LISTENING";
                return;
            }
        } catch (e) { log("Polling error"); }
        
        attempts++;
        setTimeout(check, 2000);
    };
    check();
}

function speak(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    window.speechSynthesis.speak(msg);
}

/**
 * BUTTON CLICK HANDLER
 */
mainBtn.addEventListener('click', async () => {
    vibHaptic();
    if (!isStarted) {
        const ok = await initMic();
        if (ok) {
            isStarted = true;
            setupRecognition();
            try {
                recognition.start();
            } catch(e) { log("Start Error: " + e.message); }
        }
    } else {
        // Toggle off
        isStarted = false;
        recognition.stop();
        log("System manually stopped");
    }
});

// Bar animation for the wave
setInterval(() => {
    if (isStarted) {
        const bars = document.querySelectorAll('.bar');
        bars.forEach(b => {
            const h = isRecording ? Math.random() * 40 + 10 : Math.random() * 15 + 5;
            b.style.height = h + 'px';
        });
    }
}, 100);

</script>
</body>
</html>
